<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenVideo | AI Cinema Architect</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    
    <main class="glass-container">
        <header>
            <h1 class="logo">ZenVideo</h1>
            <p class="subtitle">Autonomous AI Cinematic Engine</p>
        </header>

        <section id="setup-form">
            <div class="input-group">
                <label for="topic">🏷️ 영상 주제</label>
                <input type="text" id="topic" placeholder="예: 신비로운 우주의 아침, 평화로운 숲..." required>
            </div>
            
            <div class="input-group">
                <label for="duration">⏱️ 영상 길이</label>
                <div class="duration-selector">
                    <button class="duration-btn" data-value="1">1분</button>
                    <button class="duration-btn active" data-value="3">3분</button>
                    <button class="duration-btn" data-value="5">5분</button>
                    <button class="duration-btn" data-value="10">10분</button>
                </div>
                <input type="hidden" id="duration" value="3">
            </div>

            <div class="input-group">
                <label for="passcode">🔐 보안 패스코드</label>
                <input type="password" id="passcode" placeholder="Passcode를 입력하세요" required>
            </div>

            <button id="generate-btn" class="primary-btn">영화 제작 시작</button>
        </section>

        <section id="status-panel" class="hidden">
            <div class="status-box">
                <div class="spinner"></div>
                <h2 id="status-text">생성 준비 중...</h2>
                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <p id="detail-text">AI 에이전트들이 작업을 조율하고 있습니다.</p>
            </div>
        </section>

        <section id="result-panel" class="hidden">
            <h2>🎥 마스터피스 완성!</h2>
            <div class="video-preview">
                <!-- Video will be injected here -->
            </div>
            <a id="download-link" href="#" class="primary-btn" download>영상 다운로드</a>
            <button id="reset-btn" class="secondary-btn">새 영상 만들기</button>
        </section>

        <footer>
            <p>&copy; 2026 ZenVideo Lab | Powered by Gemini & Shotstack</p>
        </footer>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
